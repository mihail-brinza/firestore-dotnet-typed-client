name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FIRESTORE_EMULATOR_HOST: localhost:8080
  FIRESTORE_PROJECT_ID: project-test

jobs:
  build_and_tests:
    runs-on: ubuntu-latest
    services:
      firestore:
        image: mtlynch/firestore-emulator:latest
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
      - name: Test Report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: .NET Tests
          path: test/Firestore.Typed.Client.Tests/TestResults/test-results.trx
          reporter: dotnet-trx
      - name: Extract Coverage Percentage
        id: coverage
        run: |
          REPORT=$(find test -name 'coverage.cobertura.xml' | head -1)
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$REPORT")
          PERCENT=$(echo "$LINE_RATE * 100" | bc -l | xargs printf '%.1f')
          echo "value=${PERCENT}" >> $GITHUB_OUTPUT
      - name: Update Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.value }}%
          valColorRange: ${{ steps.coverage.outputs.value }}
          minColorRange: 0
          maxColorRange: 100

  publish_nuget:
    needs: build_and_tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Package
        run: dotnet pack -c Release -o . src/Firestore.Typed.Client/Firestore.Typed.Client.csproj
      - name: Publish NuGet
        run: dotnet nuget push *.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

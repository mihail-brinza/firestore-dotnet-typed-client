name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FIRESTORE_EMULATOR_HOST: localhost:8080
  FIRESTORE_PROJECT_ID: project-test

jobs:
  build_and_tests:
    runs-on: ubuntu-latest
    services:
      firestore:
        image: mtlynch/firestore-emulator:latest
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --logger "trx;LogFileName=test-results.trx"
      - name: Test Report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: .NET Tests
          path: test/Firestore.Typed.Client.Tests/TestResults/test-results.trx
          reporter: dotnet-trx

  publish_nuget:
    needs: build_and_tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Package
        run: dotnet pack -c Release -o . src/Firestore.Typed.Client/Firestore.Typed.Client.csproj
      - name: Publish NuGet
        run: dotnet nuget push *.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

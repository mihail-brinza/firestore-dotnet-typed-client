name: Build and run tests

on:
  push:
  pull_request:
    branches: [ main ]

env:
  FIRESTORE_EMULATOR_HOST: localhost:8080
  FIRESTORE_PROJECT_ID: project-test

jobs:
  build_and_tests:
    runs-on: ubuntu-latest
    services: # ramp up a firestore emulator instance
      firestore:
        image: mtlynch/firestore-emulator:latest
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --logger "trx;LogFileName=test-results.trx"
      - name: Test Report
        uses: dorny/test-reporter@v2
        if: success() || failure()    # run this step even if previous step failed
        with:
          name: .NET Tests                  # Name of the check run which will be created
          path: test/Firestore.Typed.Client.Tests/TestResults/test-results.trx    # Path to test results
          reporter: dotnet-trx              # Format of test results
